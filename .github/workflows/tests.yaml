name: Tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  go_test:
    name: Test
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, macos-13, ubuntu-24.04-arm]
        go: ["1.23"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: curl
        run: |
          curl -OL https://github.com/taniabogatsch/duckdb/releases/download/v1.4.2/duckdb-static-lib-linux-aarch64.zip
          curl -OL https://github.com/taniabogatsch/duckdb/releases/download/v1.4.2/duckdb-static-lib-linux-amd64.zip
        shell: bash
      - name: "Run tests"
        run: make test
      - uses: actions/upload-artifact@v4
        with:
          name: test
          path: go-duckdb.test.exe
          retention-days: 1

  test_examples:
    name: Test examples
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: "Test examples"
        run: make examples

  freebsd_amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y \
              gmake \
              git \
              go
          run: gmake test
